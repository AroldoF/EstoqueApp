<svg width="100%" viewBox="0 0 680 340" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="body-g" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7c5ce8"/>
      <stop offset="100%" stop-color="#5b3fc4"/>
    </linearGradient>
    <linearGradient id="lid-g" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#9470f0"/>
      <stop offset="100%" stop-color="#7c5ce8"/>
    </linearGradient>
    <linearGradient id="shadow-g" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3a2580" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#3a2580" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- shadow -->
  <ellipse cx="340" cy="272" rx="88" ry="18" fill="url(#shadow-g)" style="stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- body -->
  <rect x="256" y="148" width="168" height="120" rx="14" fill="url(#body-g)" style="stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- body right face (3d depth) -->
  <polygon points="424,148 440,134 440,254 424,268" fill="#4a30a8" opacity="0.7" style="fill:rgb(74, 48, 168);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.7;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- body bottom face -->
  <polygon points="256,268 272,282 440,282 424,268" fill="#3e2896" opacity="0.8" style="fill:rgb(62, 40, 150);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.8;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- inner shadow top of body -->
  <rect x="256" y="148" width="168" height="18" rx="0" fill="#5b3fc4" opacity="0.35" style="fill:rgb(91, 63, 196);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.35;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- lid -->
  <rect x="248" y="116" width="184" height="44" rx="10" fill="url(#lid-g)" style="stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

